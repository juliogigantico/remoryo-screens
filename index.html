<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>remoryo — Screen Overview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, sans-serif; background: #f5f5f5; color: #1B2C43; padding: 24px; }
    h1 { font-size: 22px; font-weight: 700; }
    .subtitle { font-size: 13px; color: #94A3B3; margin-bottom: 28px; }
    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      color: #94A3B3; margin-bottom: 14px; padding-left: 4px;
      border-left: 3px solid #FFA631; padding-left: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: #1B2C43;
      border: 1px solid #eee;
      transition: box-shadow 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .card-preview {
      width: 100%;
      aspect-ratio: 393 / 852;
      overflow: hidden;
      position: relative;
      background: #f9f9f9;
    }
    .card-preview iframe {
      width: 393px;
      height: 852px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }
    .card-label {
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border-top: 1px solid #f0f0f0;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 13px;
      color: #94A3B3;
      text-decoration: none;
    }
    .back-link:hover { color: #1B2C43; }
  </style>
</head>
<body>
  <h1>remoryo Screens</h1>
  <p class="subtitle">35 Screens · 8 Kategorien · Stand März 2026</p>

  <div class="section">
    <div class="section-title">Auth & Registration (5)</div>
    <div class="grid" id="grid-auth"></div>
  </div>

  <div class="section">
    <div class="section-title">Onboarding (2)</div>
    <div class="grid" id="grid-onboarding"></div>
  </div>

  <div class="section">
    <div class="section-title">Home / Fotos (5)</div>
    <div class="grid" id="grid-home"></div>
  </div>

  <div class="section">
    <div class="section-title">Magazin-Editor (3)</div>
    <div class="grid" id="grid-magazine"></div>
  </div>

  <div class="section">
    <div class="section-title">Settings (3)</div>
    <div class="grid" id="grid-settings"></div>
  </div>

  <div class="section">
    <div class="section-title">Settings Detail (7)</div>
    <div class="grid" id="grid-settings-detail"></div>
  </div>

  <div class="section">
    <div class="section-title">Utility & Flows (6)</div>
    <div class="grid" id="grid-utility"></div>
  </div>

  <div class="section">
    <div class="section-title">Zusätzliche Screens (4)</div>
    <div class="grid" id="grid-additional"></div>
  </div>

<script>
const screens = {
  'grid-auth': { file: 'auth-preview.html', screens: ['Login', 'Login Fehler', 'Registrierung', 'Web Landing', 'In-App Welcome'] },
  'grid-onboarding': { file: 'onboarding-preview.html', screens: ["So funktioniert's", 'Familie einladen'] },
  'grid-home': { file: 'app-home-preview.html', screens: ['Fotos Tab', 'Empty State', 'Magazine Tab', 'Magazine Empty', 'Foto-Kommentare'] },
  'grid-magazine': { file: 'app-magazine-preview.html', screens: ['Magazin-Übersicht', 'Seitenübersicht', 'Foto auswählen'] },
  'grid-settings': { file: 'app-settings-preview.html', screens: ['Einstellungen', 'Nutzerprofil', 'Abonnement'] },
  'grid-settings-detail': { file: 'app-settings-detail-preview.html', screens: ['Lieferadresse', 'Zahlung (Verwalter)', 'Zahlung (Mitglied)', 'Gruppenmitglieder', 'Passwort ändern', 'Account löschen', 'Profil bearbeiten'] },
  'grid-utility': { file: 'app-utility-preview.html', screens: ['PW vergessen', 'PW Erfolg', 'Netzwerk-Fehler', 'Gruppen wechseln', 'Einladung annehmen', 'Erstes Magazin'] },
  'grid-additional': { file: 'app-additional-preview.html', screens: ['Foto-Vollansicht', 'Kommentar schreiben', 'Upload-Bestätigung', 'Push Permission'] }
};

Object.entries(screens).forEach(([gridId, data]) => {
  const grid = document.getElementById(gridId);
  data.screens.forEach((name, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = data.file;
    card.innerHTML = `
      <div class="card-preview" data-file="${data.file}" data-index="${i}">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ccc;font-size:24px;">⏳</div>
      </div>
      <div class="card-label">${name}</div>`;
    grid.appendChild(card);
  });
});

// Lazy-load iframes with IntersectionObserver
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const el = entry.target;
      const file = el.dataset.file;
      const cardWidth = el.offsetWidth;
      const scale = cardWidth / 393;
      const iframe = document.createElement('iframe');
      iframe.src = file;
      iframe.style.transform = `scale(${scale})`;
      iframe.loading = 'lazy';
      el.innerHTML = '';
      el.appendChild(iframe);
      observer.unobserve(el);
    }
  });
}, { rootMargin: '200px' });

document.querySelectorAll('.card-preview').forEach(el => observer.observe(el));
</script>
</body>
</html>
