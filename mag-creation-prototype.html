<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Remoryo — Magazin-Erstellung</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   RESET + TOKENS
   ═══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#82B7D8;--blue-light:#EAF3F9;--blue-soft:#D4E8F2;
  --turquoise:#B8E0E0;--turquoise-light:#E2F3F3;
  --navy:#1B2C43;--orange:#FFA631;--white:#FFFFFF;--beige:#E8DDD1;
  --dark-gray:#5A6B7A;--mid-gray:#94A3B3;--light-gray:#F5F6F8;
  --border:#E2E6EB;--border-alt:#D0D5DB;
  --red:#E74C3C;--soft-red:#FFF0EE;--soft-green:#E6F7EE;
  --soft-orange:#FFF3DC;--soft-orange-bg:#FFF8F0;
  --green-text:#1D8348;--caption-warm:#F8F6F4;
  --radius:14px;--radius-sm:12px;
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --sheet-ease:cubic-bezier(.32,.72,0,1);
}

/* ═══════════════════════════════════════════════════════════
   BODY + PHONE FRAME
   ═══════════════════════════════════════════════════════════ */
html{-webkit-text-size-adjust:100%;height:100%}
body{
  font-family:var(--font);color:var(--navy);
  background:#E8E6E1;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  -webkit-font-smoothing:antialiased;
}
.phone{
  width:393px;height:852px;background:var(--white);
  border-radius:48px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
  box-shadow:0 0 0 1px rgba(0,0,0,.04),0 12px 40px rgba(27,44,67,.12),0 40px 80px rgba(27,44,67,.08);
}
.phone::before{
  content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:126px;height:36px;background:#000;border-radius:20px;z-index:100;
}
#statusBar{height:59px;flex-shrink:0}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;display:flex;flex-direction:column}
#screen::-webkit-scrollbar{display:none}
#screen{scrollbar-width:none}
.safe-bottom{height:20px;flex-shrink:0}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE — Mobile fullscreen
   ═══════════════════════════════════════════════════════════ */
@media(max-width:499px){
  body{padding:0;background:var(--white)}
  .phone{width:100vw;height:100dvh;border-radius:0;box-shadow:none}
  .phone::before{display:none}
  #statusBar{height:env(safe-area-inset-top,44px)}
}

/* ═══════════════════════════════════════════════════════════
   OVERLAY CONTAINERS (Bottom Sheet + Modal)
   ═══════════════════════════════════════════════════════════ */
#sheetBackdrop,#modalBackdrop{
  position:absolute;inset:0;z-index:50;
  background:rgba(27,44,67,.45);backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:opacity .3s var(--sheet-ease);
}
#sheetBackdrop.show,#modalBackdrop.show{opacity:1;pointer-events:auto}
#sheetContainer{
  position:absolute;bottom:0;left:0;right:0;z-index:51;
  background:var(--white);border-radius:24px 24px 0 0;
  padding:8px 20px 28px;
  transform:translateY(100%);transition:transform .38s var(--sheet-ease);
  max-height:80%;overflow-y:auto;
}
#sheetContainer.show{transform:translateY(0)}
#sheetContainer::-webkit-scrollbar{display:none}
#modalContainer{
  position:absolute;top:50%;left:50%;z-index:51;
  transform:translate(-50%,-50%) scale(.92);opacity:0;
  background:var(--white);border-radius:24px;padding:28px;
  width:calc(100% - 48px);max-width:340px;
  transition:transform .3s var(--sheet-ease),opacity .3s;
  pointer-events:none;
}
#modalContainer.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}

/* ═══════════════════════════════════════════════════════════
   TYPOGRAPHY
   ═══════════════════════════════════════════════════════════ */
.headline{font-weight:800;font-size:26px;line-height:1.2;text-align:center}
.sub{font-weight:500;font-size:15px;color:var(--dark-gray);text-align:center;line-height:1.5}

/* ═══════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════ */
.btn{
  width:100%;padding:14px 24px;border-radius:var(--radius);
  font-weight:700;font-size:16px;border:none;cursor:pointer;
  font-family:var(--font);min-height:48px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .12s,opacity .12s;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--orange);color:var(--white)}
.btn-primary.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-outline{background:var(--white);color:var(--navy);border:1.5px solid var(--navy)}
.btn-text{background:none;border:none;font-weight:600;font-size:14px;color:var(--navy);padding:12px}
.btn-text-gray{background:none;border:none;font-weight:500;font-size:14px;color:var(--mid-gray);padding:12px}
.btn-sm{padding:10px 20px;font-size:14px;min-height:40px;width:auto}
.btn-stack{display:flex;flex-direction:column;gap:12px;width:100%}

/* ═══════════════════════════════════════════════════════════
   SECTION HEADER
   ═══════════════════════════════════════════════════════════ */
.sec-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sec-back{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
  border-radius:22px;transition:background .15s;
}
.sec-back:active{background:var(--light-gray)}
.sec-title{font-weight:700;font-size:17px}

/* ═══════════════════════════════════════════════════════════
   S1 — MODE SELECTION
   ═══════════════════════════════════════════════════════════ */
.mode-hero{padding:32px 24px 20px;text-align:center}
.mode-hero .headline{margin-bottom:8px}
.entry-card{
  border-radius:20px;padding:24px;margin:0 20px 14px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.entry-card:active{transform:scale(.98)}
.entry-card--auto{
  background:linear-gradient(135deg,#D4E8F2 0%,var(--white) 100%);
  border:1.5px solid var(--blue-soft);
}
.entry-card--manual{background:var(--light-gray);border:1.5px solid var(--border)}
.entry-card-icon{font-size:32px;margin-bottom:10px}
.entry-card-title{font-weight:700;font-size:18px;margin-bottom:6px}
.entry-card-desc{font-size:14px;color:var(--dark-gray);line-height:1.5;margin-bottom:14px}
.entry-card .btn{font-size:15px;padding:12px 20px}
.info-note{font-size:12px;color:var(--mid-gray);text-align:center;padding:8px 24px;display:flex;align-items:center;justify-content:center;gap:5px}

/* ═══════════════════════════════════════════════════════════
   S2 — PHOTO SELECTION
   ═══════════════════════════════════════════════════════════ */
.selection-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.selection-count{font-size:15px;font-weight:700}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
.photo-cell{
  position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:transform .1s;
}
.photo-cell:active{transform:scale(.96)}
.photo-cell-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.photo-check{
  position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--sheet-ease);
}
.photo-check--on{background:var(--orange);transform:scale(1)}
.photo-check--off{border:2px solid rgba(255,255,255,.6);background:rgba(255,255,255,.15)}
.photo-cell--sel{outline:3px solid var(--orange);outline-offset:-3px}
.info-banner{
  background:var(--soft-orange-bg);border-left:3px solid var(--orange);
  border-radius:12px;margin:12px 16px;padding:14px 16px;font-size:13px;
  color:var(--dark-gray);line-height:1.5;
}

/* ═══════════════════════════════════════════════════════════
   S3 — LOADING
   ═══════════════════════════════════════════════════════════ */
.loading-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(180deg,var(--blue-light) 0%,var(--white) 100%);gap:20px;padding:40px;
}
.loading-icon{animation:pulse 2s ease-in-out infinite;font-size:48px}
.loading-title{font-size:20px;font-weight:700;text-align:center}
.loading-sub{font-size:14px;color:var(--mid-gray);text-align:center}
.progress-track{width:240px;height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--orange);width:0%;transition:width 3s ease-out}
@keyframes pulse{0%,100%{transform:scale(.95);opacity:.7}50%{transform:scale(1.05);opacity:1}}

/* ═══════════════════════════════════════════════════════════
   S14 — PAGES OVERVIEW
   ═══════════════════════════════════════════════════════════ */
.overview-header{padding:16px 20px 8px}
.overview-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.overview-title{font-size:18px;font-weight:800}
.overview-date{font-size:13px;color:var(--mid-gray)}
.progress-section{margin-top:10px}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:14px;font-weight:700}
.progress-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--orange);transition:width .4s}
.progress-hint{font-size:12px;color:var(--orange);font-weight:600;margin-top:4px}
.page-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 16px}
.page-thumb{
  aspect-ratio:210/297;border-radius:10px;border:2px solid var(--border);
  position:relative;overflow:hidden;background:var(--white);cursor:pointer;
  transition:transform .12s,border-color .15s;-webkit-tap-highlight-color:transparent;
}
.page-thumb:active{transform:scale(.97)}
.page-thumb:hover{border-color:var(--blue-soft)}
.page-thumb--empty{border:2px dashed var(--border-alt);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.page-thumb-add{width:32px;height:32px;border-radius:16px;background:var(--blue-light);display:flex;align-items:center;justify-content:center}
.page-number{
  position:absolute;bottom:4px;right:4px;background:rgba(27,44,67,.55);
  color:var(--white);font-size:10px;font-weight:600;border-radius:6px;padding:2px 6px;
}
.page-block{border-radius:3px;margin:3px}
.page-block--photo{background:var(--blue-light)}
.page-block--ent{background:var(--turquoise-light);display:flex;align-items:center;justify-content:center}
.page-block--text{background:var(--soft-orange-bg);display:flex;align-items:center;justify-content:center}
.page-block--empty{background:var(--light-gray);border:1px dashed var(--border-alt)}
.bottom-action-bar{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:10px;flex-shrink:0;background:var(--white);
  position:sticky;bottom:0;z-index:10;
}
.bottom-action-bar .btn{font-size:14px;padding:12px 8px}

/* ═══════════════════════════════════════════════════════════
   S4-S8 — WYSIWYG EDITOR
   ═══════════════════════════════════════════════════════════ */
.editor-wrap{flex:1;display:flex;flex-direction:column;background:var(--light-gray)}
.editor-page-area{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 16px}
.wysiwyg-page{
  width:361px;height:510px;background:#FBF9F6;border-radius:6px;position:relative;
  box-shadow:0 2px 12px rgba(27,44,67,.08),0 0 0 1px rgba(27,44,67,.06);
  display:flex;flex-direction:column;overflow:hidden;
  /* subtle paper texture */
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='.02'/%3E%3C/svg%3E");
}
.wysiwyg-header{
  height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;padding:8px 14px 4px;
}
.wysiwyg-family{font-size:10px;font-weight:800;color:var(--navy);letter-spacing:.4px}
.wysiwyg-month{font-size:17px;font-weight:800;color:var(--orange)}
.wysiwyg-content{flex:1;padding:0 14px;display:flex;flex-direction:column;gap:6px;min-height:0}
.wysiwyg-footer{
  height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.wysiwyg-footer span{font-size:8px;color:var(--mid-gray)}

/* Editor slots */
.slot{
  position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,transform .1s;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;
}
.slot:hover{box-shadow:0 0 0 2px var(--blue)}
.slot:active{transform:scale(.99)}
.slot--empty{
  border:2px dashed var(--border-alt);background:var(--light-gray);
  align-items:center;justify-content:center;gap:6px;
}
.slot-empty-icon{
  width:36px;height:36px;border-radius:18px;background:var(--blue-light);
  display:flex;align-items:center;justify-content:center;
}
.slot-empty-text{font-size:11px;color:var(--mid-gray);font-weight:500}
.slot-photo{display:flex;flex-direction:column}
.slot-photo-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
.slot-caption{
  background:var(--caption-warm);padding:6px 8px;
  display:flex;align-items:center;gap:6px;min-height:28px;
}
.slot-caption-circle{
  width:18px;height:18px;border-radius:9px;background:var(--blue);
  display:flex;align-items:center;justify-content:center;
  font-size:6px;font-weight:700;color:var(--white);flex-shrink:0;
}
.slot-caption-text{font-size:8px;color:var(--navy);line-height:1.3;flex:1;min-width:0}
.slot-caption-name{font-weight:700;color:var(--blue);font-size:7px}
.slot-caption-date{color:var(--orange);font-size:7px}
.slot-ent{
  background:var(--turquoise-light);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
}
.slot-ent-icon{font-size:20px}
.slot-ent-label{font-size:10px;font-weight:600;color:var(--dark-gray)}
.slot-text{
  background:var(--soft-orange-bg);display:flex;align-items:center;justify-content:center;
  padding:10px;
}
.slot-text-content{font-size:9px;color:var(--dark-gray);text-align:center;line-height:1.4}
.slot-edit-badge{
  position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:11px;
  background:rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;z-index:2;
}

/* Editor toolbar */
.editor-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;
}
.toolbar-btn{
  width:44px;height:44px;border-radius:12px;border:none;background:var(--light-gray);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background .15s;
}
.toolbar-btn:active{background:var(--border)}
.toolbar-nav{display:flex;align-items:center;gap:12px}
.toolbar-nav-label{font-size:14px;font-weight:700;min-width:80px;text-align:center}
.toolbar-arrow{
  width:36px;height:36px;border-radius:18px;border:none;background:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;color:var(--navy);
}
.toolbar-arrow:active{background:var(--light-gray)}
.toolbar-arrow:disabled{opacity:.3;cursor:not-allowed}

/* ═══════════════════════════════════════════════════════════
   COVER PAGE SPECIAL
   ═══════════════════════════════════════════════════════════ */
.cover-photo-area{
  flex:1;position:relative;display:flex;align-items:flex-end;
}
.cover-overlay{
  position:absolute;bottom:0;left:0;right:0;padding:14px;
  background:linear-gradient(transparent,rgba(27,44,67,.75));
}
.cover-logo{font-size:10px;color:rgba(255,255,255,.8);font-weight:700;margin-bottom:4px}
.cover-title{font-size:16px;font-weight:800;color:var(--white);line-height:1.2}
.cover-date{font-size:9px;color:rgba(255,255,255,.65);margin-top:2px}

/* ═══════════════════════════════════════════════════════════
   BOTTOM SHEET CONTENT
   ═══════════════════════════════════════════════════════════ */
.drag-handle{width:40px;height:4px;border-radius:2px;background:var(--border-alt);margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--mid-gray);margin-bottom:14px}

/* Layout picker */
.layout-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.layout-opt{
  border:2px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;
  text-align:center;transition:border-color .15s;-webkit-tap-highlight-color:transparent;
  position:relative;
}
.layout-opt:active{transform:scale(.97)}
.layout-opt--sel{border-color:var(--orange)}
.layout-preview{display:flex;flex-direction:column;gap:3px;min-height:70px}
.layout-block{border-radius:3px;flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--mid-gray);font-weight:600}
.layout-block--p{background:var(--blue-light)}
.layout-block--e{background:var(--turquoise-light)}
.layout-label{font-size:11px;font-weight:600;color:var(--navy);margin-top:6px}

/* Entertainment list */
.ent-list{max-height:380px;overflow-y:auto;margin:0 -20px;padding:0 20px}
.ent-row{
  display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);
  gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.ent-row:last-child{border-bottom:none}
.ent-row:active{opacity:.7}
.ent-icon{
  width:44px;height:44px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;
}
.ent-info{flex:1}
.ent-name{font-size:15px;font-weight:600}
.ent-desc{font-size:12px;color:var(--mid-gray);margin-top:1px}
.ent-preview-card{
  background:var(--turquoise-light);border-radius:16px;padding:20px;
  margin-bottom:16px;text-align:center;min-height:120px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.ent-preview-title{font-size:15px;font-weight:700}
.ent-preview-text{font-size:14px;color:var(--dark-gray);line-height:1.5}
.ent-preview-meta{font-size:12px;color:var(--mid-gray);margin-top:8px}

/* Element type picker */
.type-cards{display:flex;flex-direction:column;gap:10px}
.type-card{
  display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;
  border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.type-card:active{border-color:var(--blue);transform:scale(.98)}
.type-card-icon{
  width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0;
}
.type-card-info{flex:1}
.type-card-title{font-size:15px;font-weight:700}
.type-card-desc{font-size:12px;color:var(--mid-gray);margin-top:2px}

/* Slot actions */
.action-list{display:flex;flex-direction:column;gap:2px}
.action-row{
  display:flex;align-items:center;gap:14px;padding:14px 4px;
  border-bottom:1px solid var(--border);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.action-row:last-child{border-bottom:none}
.action-row:active{opacity:.7}
.action-row--danger .action-label{color:var(--red)}
.action-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.action-label{font-size:15px;font-weight:600}
.action-desc{font-size:12px;color:var(--mid-gray)}

/* ═══════════════════════════════════════════════════════════
   S12c — PAN / CROP OVERLAY
   ═══════════════════════════════════════════════════════════ */
.crop-overlay{
  position:absolute;inset:0;z-index:60;background:rgba(27,44,67,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.crop-frame{
  width:280px;height:200px;border:2px solid var(--white);border-radius:8px;
  overflow:hidden;position:relative;cursor:grab;touch-action:none;
}
.crop-frame:active{cursor:grabbing}
.crop-image{

.reorder-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 16px}
.reorder-thumb{
  aspect-ratio:210/297;border-radius:10px;border:2px solid var(--border);

  transition:transform .2s,box-shadow .2s,border-color .2s;
  -webkit-tap-highlight-color:transparent;
}

.reorder-thumb--target{border:2px dashed var(--blue);background:var(--blue-light)}

.success-title{font-size:24px;font-weight:800}

function nav(screen,pushCurrent=true){
  if(pushCurrent&&S.screen) S.navStack.push(S.screen);
  S.screen=screen;
  render();
}
function goBack(){
  if(S.navStack.length){S.screen=S.navStack.pop();render()}
}
function render(noScroll){
  const el=document.getElementById('screen');
  hideSheet();hideModal();
  switch(S.screen){
    case 'mode-selection':el.innerHTML=renderModeSelection();break;
    case 'photo-selection':el.innerHTML=renderPhotoSelection();break;
    case 'loading':el.innerHTML=renderLoading();startLoading();break;
    case 'editor':el.innerHTML=renderEditor();break;
    case 'overview':el.innerHTML=renderOverview();break;
    case 'reorder':el.innerHTML=renderReorder();break;
    case 'save-success':el.innerHTML=renderSaveSuccess();break;
  }
  if(!noScroll) el.scrollTop=0;
}

function showSheet(html){
  document.getElementById('sheetContainer').innerHTML='<div class="drag-handle"></div>'+html;
  requestAnimationFrame(()=>{
    document.getElementById('sheetBackdrop').classList.add('show');
    document.getElementById('sheetContainer').classList.add('show');
  });
}
function hideSheet(){
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('sheetContainer').classList.remove('show');
}
function showModal(html){
  document.getElementById('modalContainer').innerHTML=html;
  requestAnimationFrame(()=>{
    document.getElementById('modalBackdrop').classList.add('show');
    document.getElementById('modalContainer').classList.add('show');
  });
}
function hideModal(){
  document.getElementById('modalBackdrop').classList.remove('show');
  document.getElementById('modalContainer').classList.remove('show');
}

function initMagazine(mode){

  const entRotation=['crossword','jokes','motivation','songs','quiz','poems','words','numbers'];
  let entIdx=0;
  function takePhoto(){
    if(!pq.length) return null;
    const pid=pq.shift();
    return {type:'photo',photoId:pid,caption:CAPTIONS[pid%CAPTIONS.length],pos:{x:0,y:0,z:1}};
  }
  function takeEnt(){
    const catId=entRotation[entIdx%entRotation.length];
    entIdx++;
    return {type:'entertainment',catId,itemIdx:0};
  }
  // Page 0 = Cover
  S.mag.pages.push({type:'cover',layout:'full',slots:[{content:mode==='auto'?takePhoto():null}]});
  if(mode==='auto'){
    // Smart layout sequence — adapts to photo count
    const sequence=['1-foto','2-fotos','1-foto','foto-ent','2-fotos','3-fotos','ent-foto','1-foto','2-fotos','1-foto'];
    for(let i=0;i<10;i++){
      let lid=sequence[i];
      const ldef=LAYOUTS.find(l=>l.id===lid);
      const photoNeeded=ldef.slots.filter(s=>s.accepts==='photo').length;
      // Downgrade if not enough photos
      if(pq.length<photoNeeded){
        if(pq.length>=1) lid='1-foto';
        else lid='1-ent';
      }
      const finalL=LAYOUTS.find(l=>l.id===lid);
      const slots=finalL.slots.map(s=>{
        if(s.accepts==='photo'){
          const p=takePhoto();
          return {content:p||takeEnt()};
        }
        return {content:takeEnt()};
      });
      S.mag.pages.push({type:'content',layout:lid,slots});
    }
    // Ensure at least 1 entertainment
    const hasEnt=S.mag.pages.some(p=>p.type==='content'&&p.slots.some(s=>s.content?.type==='entertainment'));
    if(!hasEnt){
      const p4=S.mag.pages[4];
      if(p4&&p4.type==='content'){
        const oldFirst=p4.slots[0]?.content;
        p4.layout='foto-ent';
        p4.slots=[{content:oldFirst},{content:takeEnt()}];
      }
    }
  } else {
    for(let i=0;i<10;i++){
      S.mag.pages.push({type:'content',layout:'1-foto',slots:[{content:null}]});
    }
  }
  // Page 11 = Back
  S.mag.pages.push({
    type:'back',variant:'emotional',
    quote:'\u201eFamilie ist, wo das Leben seinen Anfang nimmt und die Liebe niemals endet.\u201c',
    backSlot:{content:null}
  });
}

function getFilledCount(){
  let c=0;
  S.mag.pages.forEach((p,i)=>{
    if(i===0||i===11) return;
    p.slots.forEach(s=>{if(s.content) c++});
  });
  return c;
}
function getTotalSlots(){
  let c=0;
  S.mag.pages.forEach((p,i)=>{if(i>0&&i<11) c+=p.slots.length});
  return c;
}

/* ═══════════════════════════════════════════════════════════
   SHARED: PAGE THUMBNAIL RENDERER
   ═══════════════════════════════════════════════════════════ */
function renderThumb(page,idx){
  if(page.type==='cover'){
    const bg=page.slots[0]?.content?.type==='photo'?GRADIENTS[page.slots[0].content.photoId%15]:'var(--light-gray)';
    return `<div style="width:100%;height:100%;background:${bg};position:relative;display:flex;align-items:flex-end">
      <div style="position:absolute;bottom:0;left:0;right:0;padding:6px;background:linear-gradient(transparent,rgba(27,44,67,.6))">
        <div style="font-size:5px;color:rgba(255,255,255,.7);font-weight:700">remoryo</div>
        <div style="font-size:7px;color:white;font-weight:800">${esc(S.mag.title)}</div>
        <div style="font-size:5px;color:rgba(255,255,255,.6)">${S.mag.month}</div>
      </div>
    </div>`;
  }
  if(page.type==='back'){
    const isEmotional=page.variant==='emotional';
    return `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px;${isEmotional?'background:linear-gradient(175deg,#FBF9F6,#EDE7DF)':'background:var(--white)'}">
      <div style="font-size:6px;font-weight:800;color:var(--navy);letter-spacing:.5px">remoryo</div>
      <div style="display:flex;gap:4px">${S.members.slice(0,3).map(m=>`<div style="width:10px;height:10px;border-radius:5px;background:${m.color};display:flex;align-items:center;justify-content:center;font-size:4px;font-weight:700;color:white">${m.initial}</div>`).join('')}</div>
      ${isEmotional?`<div style="font-size:4px;font-style:italic;color:var(--navy);text-align:center;padding:0 4px">${esc(page.quote||'').substring(0,40)}...</div>`:''}
      ${!isEmotional&&page.backSlot?.content?`<div style="flex:1;width:100%;background:${page.backSlot.content.type==='photo'?GRADIENTS[page.backSlot.content.photoId%15]:'var(--turquoise-light)'};border-radius:2px;min-height:20px"></div>`:''}
      <div style="font-size:4px;color:var(--mid-gray)">♥ remoryo.de</div>
    </div>`;
  }
  const layout=LAYOUTS.find(l=>l.id===page.layout)||LAYOUTS[0];
  function thumbSlot(slot,ls){
    const h=(ls.h*100)+'%';
    if(!slot||!slot.content){
      return `<div class="page-block page-block--empty" style="height:${h}"></div>`;
    } else if(slot.content.type==='photo'){
      return `<div class="page-block page-block--photo" style="height:${h};background:${GRADIENTS[slot.content.photoId%15]}"></div>`;
    } else if(slot.content.type==='entertainment'){
      const cat=ENT_CATS.find(c=>c.id===slot.content.catId);
      return `<div class="page-block page-block--ent" style="height:${h}"><span style="font-size:10px">${cat?cat.icon:'🧩'}</span></div>`;
    } else if(slot.content.type==='freetext'){
      return `<div class="page-block page-block--text" style="height:${h}"><span style="font-size:6px;color:var(--mid-gray)">Aa</span></div>`;
    }
    return '';
  }
  if(layout.grid){
    // 3-fotos: top full-width + bottom two half-width
    return `<div style="width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:3px">
      <div class="page-block ${page.slots[0]?.content?'page-block--photo':'page-block--empty'}" style="grid-column:1/-1;${page.slots[0]?.content?.type==='photo'?'background:'+GRADIENTS[page.slots[0].content.photoId%15]:''}"></div>
      <div class="page-block ${page.slots[1]?.content?'page-block--photo':'page-block--empty'}" style="${page.slots[1]?.content?.type==='photo'?'background:'+GRADIENTS[page.slots[1].content.photoId%15]:''}"></div>
      <div class="page-block ${page.slots[2]?.content?'page-block--photo':'page-block--empty'}" style="${page.slots[2]?.content?.type==='photo'?'background:'+GRADIENTS[page.slots[2].content.photoId%15]:''}"></div>
    </div>`;
  }
  let slotsHtml='';
  layout.slots.forEach((ls,si)=>{slotsHtml+=thumbSlot(page.slots[si],ls)});
  return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:3px;gap:2px">${slotsHtml}</div>`;
}

function renderContentPage(pg){
  const layout=LAYOUTS.find(l=>l.id===pg.layout)||LAYOUTS[0];

    // 3-fotos: CSS grid layout

      <div style="min-height:0">${renderSlot(pg.slots[0]||{content:null},0)}</div>
      <div style="min-height:0">${renderSlot(pg.slots[1]||{content:null},1)}</div>
      <div style="min-height:0">${renderSlot(pg.slots[2]||{content:null},2)}</div>
    </div>`;
  } else {
    layout.slots.forEach((ls,si)=>{
      const slot=pg.slots[si]||{content:null};
      slotsHtml+=`<div style="flex:${ls.h};min-height:0">${renderSlot(slot,si)}</div>`;
    });
  }
  return `<div class="wysiwyg-header">
    <div class="wysiwyg-family">${S.mag.family}</div>
    <div class="wysiwyg-month">${S.mag.month.split(' ')[0]}</div>

  <div class="wysiwyg-content">${slotsHtml}</div>
  <div class="wysiwyg-footer"><span>♥ remoryo</span></div>`;

function renderSlot(slot,si){
  if(!slot.content){
    return `<div class="slot slot--empty" style="height:100%" onclick="onEmptySlot(${si})">
      <div class="slot-empty-icon">${IC.plus}</div>
      <div class="slot-empty-text">Inhalt hinzufügen</div>
    </div>`;
  }
  const c=slot.content;
  if(c.type==='photo'){
    const bg=GRADIENTS[c.photoId%15];
    const captionText=c.caption?esc(c.caption):'Bildunterschrift hinzufügen...';
    const hasCaption=!!c.caption;
    return `<div class="slot slot-photo" style="height:100%" onclick="onFilledSlot(${si})">
      <div class="slot-photo-area" style="background:${bg}">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <div class="slot-edit-badge">${IC.edit}</div>
      </div>
      <div class="slot-caption" onclick="event.stopPropagation();editCaption(${si})">
        <div class="slot-caption-circle">${NAMES[c.photoId%NAMES.length][0]}</div>
        <div>
          <div class="slot-caption-name">${NAMES[c.photoId%NAMES.length]} <span class="slot-caption-date">· 5. März</span></div>
          <div class="slot-caption-text" style="${hasCaption?'':'opacity:.5;font-style:italic'}">${captionText}</div>
        </div>
      </div>
    </div>`;
  }
  if(c.type==='entertainment'){
    const cat=ENT_CATS.find(ct=>ct.id===c.catId)||ENT_CATS[0];
    const item=cat.items[c.itemIdx%cat.items.length];
    return `<div class="slot slot-ent" style="height:100%" onclick="onFilledSlot(${si})">
      <div class="slot-edit-badge">${IC.edit}</div>
      <div class="slot-ent-icon">${cat.icon}</div>
      <div class="slot-ent-label">${cat.title}</div>
      <div style="font-size:8px;color:var(--mid-gray);margin-top:2px">${item.t||item}</div>
    </div>`;
  }
  if(c.type==='freetext'){
    return `<div class="slot slot-text" style="height:100%" onclick="onFilledSlot(${si})">
      <div class="slot-edit-badge">${IC.edit}</div>
      <div class="slot-text-content">${c.text?esc(c.text).replace(/\n/g,'<br>'):'Tippe hier, um Text einzugeben...'}</div>
    </div>`;
  }
  return '';
}

/* ═══════════════════════════════════════════════════════════
   S9 — LAYOUT PICKER
   ═══════════════════════════════════════════════════════════ */
function showLayoutPicker(){
  const pg=S.mag.pages[S.editor.pageIdx];
  if(pg.type!=='content') return;
  const puzzleIcon='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--dark-gray)" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h7v7"/></svg>';
  function layoutPreview(l){
    if(l.grid){
      return `<div class="layout-preview layout-preview--row" style="min-height:50px;flex-wrap:wrap;gap:2px">
        <div class="layout-block layout-block--p" style="flex:1 1 100%"></div>
        <div class="layout-block layout-block--p" style="flex:1 1 45%"></div>
        <div class="layout-block layout-block--p" style="flex:1 1 45%"></div>
      </div>`;
    }
    let blocks='';
    l.slots.forEach(s=>{
      const cls=s.accepts==='entertainment'?'layout-block--e':'layout-block--p';
      const icon=s.accepts==='entertainment'?puzzleIcon:'';
      blocks+=`<div class="layout-block ${cls}" style="flex:${s.h}">${icon}</div>`;
    });
    return `<div class="layout-preview">${blocks}</div>`;
  }
  let opts='';
  LAYOUTS.forEach(l=>{
    const sel=pg.layout===l.id;
    const wide=l.grid?'layout-opt--wide':'';
    opts+=`<div class="layout-opt ${sel?'layout-opt--sel':''} ${wide}" onclick="changeLayout('${l.id}')">
      ${sel?`<div style="position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:9px;background:var(--orange);display:flex;align-items:center;justify-content:center">${IC.check}</div>`:''}
      ${layoutPreview(l)}
      <div class="layout-label">${l.name}</div>
    </div>`;
  });
  showSheet(`
    <div class="sheet-title">Layout wählen</div>
    <div class="sheet-sub">Seite ${S.editor.pageIdx+1} · ${LAYOUTS.find(l=>l.id===pg.layout)?.name||''}</div>
    <div class="layout-grid">${opts}</div>
    <div class="btn btn-text-gray" onclick="hideSheet()">Abbrechen</div>
  `);
}
function changeLayout(layoutId){
  const pg=S.mag.pages[S.editor.pageIdx];
  const newLayout=LAYOUTS.find(l=>l.id===layoutId);
  if(!newLayout) return;
  // Preserve existing slot contents where possible
  const oldContents=pg.slots.map(s=>s?.content||null);
  pg.layout=layoutId;
  pg.slots=newLayout.slots.map((s,i)=>{
    // Try to reuse old content, matching by type preference
    const old=oldContents[i];
    if(old&&((s.accepts==='photo'&&old.type==='photo')||(s.accepts==='entertainment'&&old.type==='entertainment')||old.type==='freetext')){
      return {content:old};
    }
    // Fallback: just carry forward whatever was there
    if(old&&i<oldContents.length) return {content:old};
    return {content:null};
  });
  hideSheet();render();
}

/* ═══════════════════════════════════════════════════════════
   S12c — PAN / CROP OVERLAY
   ═══════════════════════════════════════════════════════════ */
function showCropOverlay(si){
  const pg=S.mag.pages[S.editor.pageIdx];
  const slot=pg.slots[si];
  if(!slot?.content||slot.content.type!=='photo') return;
  const bg=GRADIENTS[slot.content.photoId%15];
  const pos=slot.content.pos||{x:0,y:0,z:1};

  const overlay=document.createElement('div');
  overlay.className='crop-overlay';
  overlay.id='cropOverlay';
  let cx=pos.x,cy=pos.y,cz=pos.z;
  let dragging=false,sx=0,sy=0;

  overlay.innerHTML=`
    <div style="font-size:15px;font-weight:700;color:white;margin-bottom:16px">Ausschnitt anpassen</div>
    <div class="crop-frame" id="cropFrame">
      <div class="crop-image" id="cropImg" style="background:${bg};left:${cx}px;top:${cy}px;transform:scale(${cz})">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
      </div>
    </div>
    <div class="crop-controls">
      <div class="crop-btn" onclick="cropZoom(-0.1)">−</div>
      <div style="color:white;font-size:13px;font-weight:600;min-width:50px;text-align:center" id="cropZoomLabel">${Math.round(cz*100)}%</div>
      <div class="crop-btn" onclick="cropZoom(0.1)">+</div>
    </div>
    <div class="crop-actions">
      <div class="btn btn-outline" style="background:rgba(255,255,255,.1);color:white;border-color:rgba(255,255,255,.3)" onclick="closeCrop()">Abbrechen</div>
      <div class="btn btn-primary" onclick="applyCrop(${si})">Übernehmen</div>
    </div>
  `;
  document.getElementById('phone').appendChild(overlay);

  const frame=document.getElementById('cropFrame');
  const img=document.getElementById('cropImg');

  function onStart(e){
    dragging=true;
    const pt=e.touches?e.touches[0]:e;
    sx=pt.clientX-cx;sy=pt.clientY-cy;
  }
  function onMove(e){
    if(!dragging) return;
    e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    cx=pt.clientX-sx;cy=pt.clientY-sy;
    img.style.left=cx+'px';img.style.top=cy+'px';
  }
  function onEnd(){dragging=false}
  frame.addEventListener('mousedown',onStart);
  frame.addEventListener('touchstart',onStart,{passive:true});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',onEnd);
  window.addEventListener('touchend',onEnd);

  window._cropState={cz,img,cleanup:()=>{
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('touchmove',onMove);
    window.removeEventListener('mouseup',onEnd);
    window.removeEventListener('touchend',onEnd);
  }};
}
function cropZoom(delta){
  if(!window._cropState) return;
  const s=window._cropState;
  s.cz=Math.max(0.5,Math.min(2,s.cz+delta));
  s.img.style.transform=`scale(${s.cz})`;
  document.getElementById('cropZoomLabel').textContent=Math.round(s.cz*100)+'%';
}
function closeCrop(){
  if(window._cropState) window._cropState.cleanup();
  const el=document.getElementById('cropOverlay');
  if(el) el.remove();
}
function applyCrop(si){
  if(window._cropState){
    const s=window._cropState;
    const pg=S.mag.pages[S.editor.pageIdx];
    pg.slots[si].content.pos={x:parseInt(s.img.style.left),y:parseInt(s.img.style.top),z:s.cz};
    s.cleanup();
  }
  const el=document.getElementById('cropOverlay');
  if(el) el.remove();
  render();
}

/* ═══════════════════════════════════════════════════════════
   S15 — REORDER
   ═══════════════════════════════════════════════════════════ */
function renderReorder(){
  let grid='';
  S.mag.pages.forEach((p,i)=>{
    const locked=i===0||i===11;
    const picked=S.reorder.picked===i;
    const isTarget=S.reorder.picked!==null&&S.reorder.picked!==i&&!locked;
    const label=i===0?'Cover':i===11?'S.12':`S.${i+1}`;
    grid+=`<div class="reorder-thumb ${locked?'reorder-thumb--locked':''} ${picked?'reorder-thumb--picked':''} ${isTarget?'reorder-thumb--target':''}"
      onclick="${locked?'':`reorderTap(${i})`}">
      ${renderThumb(p,i)}
      <div class="page-number">${label}</div>
    </div>`;
  });
  return `<div class="screen-content fade-in">
    <div class="sec-header">
      <div class="sec-back" onclick="S.reorder.picked=null;goBack()">${IC.back}</div>
      <div class="sec-title">Seiten umsortieren</div>
    </div>
    <div style="padding:12px 20px;font-size:13px;color:var(--dark-gray)">
      ${S.reorder.picked!==null?'<b>Tippe auf die Zielposition</b>':'Tippe auf eine Seite, dann auf die Zielposition'}
    </div>
    <div class="reorder-grid">${grid}</div>
    <div style="height:20px"></div>
  </div>`;
}
function reorderTap(i){
  if(S.reorder.picked===null){S.reorder.picked=i;render(true);return}
  if(S.reorder.picked===i){S.reorder.picked=null;render(true);return}
  // swap pages
  const pages=S.mag.pages;
  const temp=pages[S.reorder.picked];
  pages[S.reorder.picked]=pages[i];
  pages[i]=temp;
  S.reorder.picked=null;
  render(true);
}

/* ═══════════════════════════════════════════════════════════
   S16 / S17 — SAVE FLOW
   ═══════════════════════════════════════════════════════════ */
function trySave(){
  const filled=getFilledCount();
  const total=getTotalSlots();
  if(filled<total){
    showModal(`
      <div class="modal-icon" style="background:var(--soft-orange)">⚠️</div>
      <div class="modal-title">Noch nicht fertig</div>
      <div class="modal-desc">${total-filled} von ${total} Slots sind noch leer. Du kannst trotzdem speichern und später weitermachen.</div>
      <div class="btn-stack" style="margin-top:16px">
        <div class="btn btn-primary" onclick="hideModal();doSave()">Speichern & später</div>
        <div class="btn btn-text" onclick="hideModal()">Weiter bearbeiten</div>
      </div>
    `);
  } else {
    doSave();
  }
}
function doSave(){nav('save-success')}
function renderSaveSuccess(){
  return `<div class="success-screen fade-in">
    <div class="success-icon">✅</div>
    <div class="success-title">Gespeichert!</div>
    <div class="success-sub">Dein Fotoheft „${esc(S.mag.title)}" wurde erfolgreich gespeichert.</div>
    <div style="margin-top:8px;font-size:14px;color:var(--mid-gray)">Du kannst es jederzeit weiterbearbeiten oder zur Bestellung abschicken.</div>
    <div class="btn-stack" style="margin-top:24px;max-width:300px">
      <div class="btn btn-primary" onclick="S.navStack=[];nav('overview',false)">Zur Übersicht</div>
      <div class="btn btn-outline" onclick="S.navStack=[];nav('mode-selection',false)">Neues Heft starten</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   BACK PAGE EDITOR FUNCTIONS
   ═══════════════════════════════════════════════════════════ */
function setBackVariant(v){
  const pg=S.mag.pages[S.editor.pageIdx];
  pg.variant=v;
  render();
}
function editBackQuote(){
  const pg=S.mag.pages[S.editor.pageIdx];
  showSheet(`
    <div class="sheet-title">Spruch bearbeiten</div>
    <textarea class="caption-input" id="quoteInput" maxlength="150" placeholder="Ein Spruch oder eine Nachricht..." style="min-height:100px">${esc(pg.quote||'')}</textarea>
    <div class="char-counter"><span id="quoteCount">${(pg.quote||'').length}</span>/150</div>
    <div class="btn btn-primary" style="margin-top:12px" onclick="saveBackQuote()">Übernehmen</div>
  `);
  setTimeout(()=>{const inp=document.getElementById('quoteInput');if(inp){inp.focus();inp.addEventListener('input',()=>{document.getElementById('quoteCount').textContent=inp.value.length})}},300);
}
function saveBackQuote(){
  const inp=document.getElementById('quoteInput');
  if(inp) S.mag.pages[S.editor.pageIdx].quote=inp.value;
  hideSheet();render();
}
function onBackSlotTap(){
  const pg=S.mag.pages[S.editor.pageIdx];
  if(pg.backSlot&&pg.backSlot.content){
    showSheet(`
      <div class="sheet-title">Foto bearbeiten</div>
      <div class="action-list">
        <div class="action-row" onclick="hideSheet();setTimeout(()=>showBackPhotoPicker(),200)">
          <div class="action-icon" style="background:var(--soft-orange)">${IC.swap}</div>
          <div><div class="action-label">Foto tauschen</div></div>
        </div>
        <div class="action-row action-row--danger" onclick="S.mag.pages[S.editor.pageIdx].backSlot={content:null};hideSheet();render()">
          <div class="action-icon" style="background:var(--soft-red)">${IC.trash}</div>
          <div><div class="action-label">Foto entfernen</div></div>
        </div>
      </div>
    `);
  } else {
    showBackPhotoPicker();
  }
}
function showBackPhotoPicker(){
  const pg=S.mag.pages[S.editor.pageIdx];
  const currentId=pg.backSlot?.content?.photoId??-1;
  let grid='';
  for(let i=0;i<15;i++){
    const isCur=i===currentId;
    grid+=`<div class="photo-cell ${isCur?'photo-cell--sel':''}" style="border-radius:8px" onclick="selectBackPhoto(${i})">
      <div class="photo-cell-inner" style="background:${GRADIENTS[i]};border-radius:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      ${isCur?'<div class="photo-check photo-check--on">'+IC.check+'</div>':''}
    </div>`;
  }
  showSheet(`
    <div class="sheet-title">Foto wählen</div>
    <div class="photo-grid" style="border-radius:12px;overflow:hidden">${grid}</div>
  `);
}
function selectBackPhoto(pid){
  S.mag.pages[S.editor.pageIdx].backSlot={content:{type:'photo',photoId:pid,caption:'',pos:{x:0,y:0,z:1}}};
  hideSheet();render();
}
function showMemberManager(){
  let rows='';
  S.members.forEach((m,i)=>{
    const bdayStr=m.birthday?fmtBdayFull(m.birthday):'—';
    const badge=m.isApp?'<span class="member-badge">App</span>':'<span class="member-badge member-badge--ext">Extern</span>';
    rows+=`<div class="member-row">
      <div class="member-circle" style="background:${m.color}">${m.initial}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-meta">🎂 ${bdayStr} · ${badge}</div>
      </div>
      <div style="cursor:pointer;padding:8px" onclick="editMember(${i})">${IC.edit}</div>
    </div>`;
  });
  showSheet(`
    <div class="sheet-title">Familienmitglieder</div>
    <div class="sheet-sub">Verwalte Namen, Geburtstage und externe Mitglieder</div>
    <div class="member-list">${rows}</div>
    <div class="btn btn-outline" style="margin-top:12px" onclick="addMember()">+ Mitglied hinzufügen</div>
    <div class="btn btn-text-gray" style="margin-top:8px" onclick="hideSheet();render()">Fertig</div>
  `);
}
function fmtBdayFull(b){if(!b)return'—';const[mm,dd]=b.split('-');return `${parseInt(dd)}. ${MONTHS_DE[parseInt(mm)-1]}`}
function editMember(idx){
  const m=S.members[idx];
  hideSheet();
  setTimeout(()=>{
    showSheet(`
      <div class="sheet-title">${esc(m.name)} bearbeiten</div>
      <div style="margin-bottom:12px">
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">Name</label>
        <input class="caption-input" id="memName" style="min-height:auto;height:44px" value="${esc(m.name)}">
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px">Geburtstag (TT.MM)</label>
        <input class="caption-input" id="memBday" style="min-height:auto;height:44px" placeholder="z.B. 15.03" value="${m.birthday?m.birthday.split('-').reverse().join('.'):''}">
      </div>
      <div class="btn btn-primary" onclick="saveMember(${idx})">Speichern</div>
      ${!m.isApp?`<div class="btn btn-text" style="color:var(--red);margin-top:8px" onclick="removeMember(${idx})">Entfernen</div>`:''}
      <div class="btn btn-text-gray" style="margin-top:4px" onclick="hideSheet();setTimeout(()=>showMemberManager(),200)">Abbrechen</div>
    `);
  },200);
}
function saveMember(idx){
  const name=document.getElementById('memName')?.value||S.members[idx].name;
  const bdayRaw=document.getElementById('memBday')?.value||'';
  S.members[idx].name=name;
  S.members[idx].initial=name[0]?.toUpperCase()||'?';
  if(bdayRaw){
    const parts=bdayRaw.split('.');
    if(parts.length===2) S.members[idx].birthday=parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
  } else {
    S.members[idx].birthday=null;
  }
  hideSheet();setTimeout(()=>showMemberManager(),200);
}
function addMember(){
  const colors=['#82B7D8','#B8E0E0','#E8DDD1','#FFA631','#D4E8F2','#94A3B3','#E8C8D8','#B8D8D8'];
  const newId=S.members.length;
  S.members.push({id:newId,name:'Neues Mitglied',initial:'N',color:colors[newId%colors.length],birthday:null,isApp:false});
  hideSheet();setTimeout(()=>editMember(newId),200);
}
function removeMember(idx){
  S.members.splice(idx,1);
  hideSheet();setTimeout(()=>showMemberManager(),200);
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
nav('mode-selection',false);
</script>
</body>
